name: Security Review

# Runs Anthropic's claude-code-security-review on every pull request — Claude
# analyzes the diff for security vulnerabilities and comments findings on the PR.
# Requires a CLAUDE_API_KEY repository secret (Settings → Secrets → Actions).

on:
  pull_request:

jobs:
  security-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-security-review@main
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
